<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopAI - E-commerce with AI Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Chatbot Styles */
        .chatbot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        .chat-bubble {
            background-color: #7c3aed;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .chat-bubble:hover {
            transform: scale(1.05);
        }
        .chat-window {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 380px;
            height: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1001;
        }
        .chat-header {
            background: #7c3aed;
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f9fafb;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message-user {
            background: #7c3aed;
            color: white;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 80%;
            align-self: flex-end;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.4;
        }
        .message-bot {
            background: #e5e7eb;
            color: #1f2937;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 80%;
            align-self: flex-start;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.4;
        }
        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
            background: white;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }
        .chat-input-area input:focus {
            border-color: #7c3aed;
        }
        .chat-input-area button {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .chat-input-area button:hover {
            background: #6d28d9;
        }
        .hidden {
            display: none !important;
        }
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #c5c5c5;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="text-xl font-bold text-purple-600 cursor-pointer" onclick="loadProducts()">🛍️ ShopAI</div>
                <div class="flex space-x-4">
                    <button onclick="loadProducts()" class="text-gray-700 hover:text-purple-600">Products</button>
                    <button onclick="showCart()" class="text-gray-700 hover:text-purple-600">Cart (<span id="cartCount">0</span>)</button>
                    <button id="authBtn" onclick="showLogin()" class="text-gray-700 hover:text-purple-600">Login</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="content">
            <h1 class="text-3xl font-bold text-center">Welcome to ShopAI</h1>
            <p class="text-center mt-2">Click Products to start shopping!</p>
        </div>
    </main>

    <!-- Cart Modal -->
    <div id="cartModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50">
        <div class="bg-white rounded-lg p-6 max-w-md mx-auto mt-20">
            <h2 class="text-xl font-bold mb-4">Your Cart</h2>
            <div id="cartItems"></div>
            <div class="mt-4">
                <p class="font-bold">Total: $<span id="cartTotal">0</span></p>
                <button onclick="checkout()" class="mt-2 bg-purple-600 text-white px-4 py-2 rounded w-full">Checkout</button>
                <button onclick="closeCart()" class="mt-2 bg-gray-500 text-white px-4 py-2 rounded w-full">Close</button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50">
        <div class="bg-white rounded-lg p-6 max-w-md mx-auto mt-20">
            <h2 class="text-xl font-bold mb-4">Login</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-2 border rounded mb-2">
            <input type="password" id="password" placeholder="Password" class="w-full p-2 border rounded mb-2">
            <button onclick="login()" class="bg-purple-600 text-white px-4 py-2 rounded w-full">Login</button>
            <button onclick="showRegister()" class="mt-2 text-purple-600 w-full">Create Account</button>
            <button onclick="closeLogin()" class="mt-2 text-gray-500 w-full">Cancel</button>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50">
        <div class="bg-white rounded-lg p-6 max-w-md mx-auto mt-20">
            <h2 class="text-xl font-bold mb-4">Register</h2>
            <input type="text" id="regName" placeholder="Full Name" class="w-full p-2 border rounded mb-2">
            <input type="email" id="regEmail" placeholder="Email" class="w-full p-2 border rounded mb-2">
            <input type="password" id="regPassword" placeholder="Password" class="w-full p-2 border rounded mb-2">
            <button onclick="register()" class="bg-purple-600 text-white px-4 py-2 rounded w-full">Register</button>
            <button onclick="closeRegister()" class="mt-2 text-gray-500 w-full">Cancel</button>
        </div>
    </div>

    <!-- Chatbot -->
    <div class="chatbot-container">
        <div id="chatBubble" class="chat-bubble">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
            </svg>
        </div>
        <div id="chatWindow" class="chat-window hidden">
            <div class="chat-header">
                <span>🤖 AI Shopping Assistant</span>
                <button id="closeChat" class="text-white text-xl">&times;</button>
            </div>
            <div id="chatMessages" class="chat-messages">
                <div class="message-bot">👋 Hi! Ask me about products, prices, or anything about our store!</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Ask me anything...">
                <button id="sendChat">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');

        function updateCartCount() {
            document.getElementById('cartCount').innerText = cart.reduce((s,i) => s + i.quantity, 0);
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}/products`);
                const products = await res.json();
                document.getElementById('content').innerHTML = `
                    <h2 class="text-2xl font-bold mb-4">Products</h2>
                    <div class="grid grid-cols-4 gap-4">
                        ${products.map(p => `
                            <div class="bg-white p-4 rounded shadow">
                                <h3 class="font-bold">${p.name}</h3>
                                <p class="text-gray-600">$${p.price}</p>
                                <p class="text-sm">Stock: ${p.stock}</p>
                                <button onclick="addToCart(${p.id}, '${p.name}', ${p.price})" 
                                        class="mt-2 bg-purple-600 text-white px-3 py-1 rounded w-full">
                                    Add to Cart
                                </button>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch(e) {
                document.getElementById('content').innerHTML = `<div class="text-red-500">Error: ${e.message}</div>`;
            }
        }

        function addToCart(id, name, price) {
            const existing = cart.find(i => i.id === id);
            if(existing) existing.quantity++;
            else cart.push({id, name, price, quantity: 1});
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert(`${name} added to cart!`);
        }

        function showCart() {
            const modal = document.getElementById('cartModal');
            const cartItems = document.getElementById('cartItems');
            if(cart.length === 0) {
                cartItems.innerHTML = '<p>Cart is empty</p>';
                document.getElementById('cartTotal').innerText = '0';
            } else {
                cartItems.innerHTML = cart.map(i => `
                    <div class="flex justify-between mb-2">
                        <div>${i.name} x ${i.quantity}</div>
                        <div>$${i.price * i.quantity}</div>
                    </div>
                `).join('');
                const total = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
                document.getElementById('cartTotal').innerText = total;
            }
            modal.classList.remove('hidden');
        }

        function closeCart() {
            document.getElementById('cartModal').classList.add('hidden');
        }

        async function checkout() {
            if(!token) {
                alert('Please login first');
                showLogin();
                return;
            }
            const total = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
            try {
                const res = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                    body: JSON.stringify({total})
                });
                if(res.ok) {
                    alert('Order placed!');
                    cart = [];
                    localStorage.setItem('cart', JSON.stringify(cart));
                    updateCartCount();
                    closeCart();
                } else alert('Order failed');
            } catch(e) { alert('Error: ' + e.message); }
        }

        function showLogin() {
            document.getElementById('loginModal').classList.remove('hidden');
        }
        function closeLogin() {
            document.getElementById('loginModal').classList.add('hidden');
        }
        function showRegister() {
            closeLogin();
            document.getElementById('registerModal').classList.remove('hidden');
        }
        function closeRegister() {
            document.getElementById('registerModal').classList.add('hidden');
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                if(res.ok) {
                    const data = await res.json();
                    token = data.token;
                    localStorage.setItem('token', token);
                    document.getElementById('authBtn').innerHTML = 'Logout';
                    document.getElementById('authBtn').onclick = () => { token=null; localStorage.removeItem('token'); location.reload(); };
                    closeLogin();
                    alert('Logged in!');
                    loadProducts();
                } else alert('Login failed');
            } catch(e) { alert('Error: ' + e.message); }
        }

        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, email, password})
                });
                if(res.ok) {
                    alert('Registered! Please login.');
                    closeRegister();
                    showLogin();
                } else alert('Registration failed');
            } catch(e) { alert('Error: ' + e.message); }
        }

        // Chatbot functionality
        function sendChat() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if(!message) return;
            
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML += `<div class="message-user">${escapeHtml(message)}</div>`;
            input.value = '';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            fetch(`${API_URL}/chat`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: message})
            })
            .then(res => res.json())
            .then(data => {
                messagesDiv.innerHTML += `<div class="message-bot">🤖 ${escapeHtml(data.response)}</div>`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            })
            .catch(err => {
                messagesDiv.innerHTML += `<div class="message-bot">❌ Error: ${escapeHtml(err.message)}</div>`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Chatbot event listeners
        document.getElementById('chatBubble').onclick = () => {
            document.getElementById('chatWindow').classList.toggle('hidden');
        };
        document.getElementById('closeChat').onclick = () => {
            document.getElementById('chatWindow').classList.add('hidden');
        };
        document.getElementById('sendChat').onclick = sendChat;
        document.getElementById('chatInput').onkeypress = (e) => {
            if(e.key === 'Enter') sendChat();
        };

        // Initialize
        updateCartCount();
        if(token) {
            document.getElementById('authBtn').innerHTML = 'Logout';
            document.getElementById('authBtn').onclick = () => { token=null; localStorage.removeItem('token'); location.reload(); };
        }
        loadProducts();
    </script>
</body>
</html>
