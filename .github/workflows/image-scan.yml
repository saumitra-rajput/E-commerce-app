# Uses Trivy Image scanner for CVEs - Docker Image

name: image-scan

on: 
  workflow_call:

jobs:
  image-scanner:
    runs-on: ubuntu-latest 
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Trivy scanning
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ vars.DOCKERHUB_USER }}/e-commerce:${{ github.sha }}
          severity: 'CRITICAL'
          exit-code: '1'