# API Keys, sensitive data, credentials 
# GitLeaks

name: secrets-scan

on:
  #push:
  workflow_call:

jobs: 
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # github Actions manage it